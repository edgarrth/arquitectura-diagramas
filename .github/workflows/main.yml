name: Debug Structurizr Export

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  debug:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show repository files
        run: |
          pwd
          find . -maxdepth 4 -type f | sort

      - name: Validate Structurizr DSL
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/usr/local/structurizr \
            structurizr/cli:latest validate \
            -workspace architecture/workspace.dsl

      - name: Export C4-PlantUML
        run: |
          rm -rf architecture/generated/c4-plantuml
          mkdir -p architecture/generated/c4-plantuml

          docker run --rm \
            -v ${{ github.workspace }}:/usr/local/structurizr \
            structurizr/cli:latest export \
            -workspace architecture/workspace.dsl \
            -format plantuml/c4plantuml \
            -output architecture/generated/c4-plantuml

      - name: Show export result
        run: |
          echo "Files after export:"
          find . -type f | sort

          echo "Generated directory:"
          ls -la architecture/generated/c4-plantuml || true
