name: Generate C4-PlantUML and Publish Docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate-c4:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Download Structurizr CLI
        run: |
          curl -L -o structurizr-cli.zip https://github.com/structurizr/cli/releases/latest/download/structurizr-cli.zip
          unzip structurizr-cli.zip -d structurizr-cli
          chmod +x structurizr-cli/structurizr.sh

      - name: Validate Structurizr DSL
        run: |
          ./structurizr-cli/structurizr.sh validate \
            -workspace architecture/workspace.dsl

      - name: Generate C4-PlantUML from Structurizr DSL
        run: |
          rm -rf architecture/generated/c4-plantuml
          mkdir -p architecture/generated/c4-plantuml

          ./structurizr-cli/structurizr.sh export \
            -workspace architecture/workspace.dsl \
            -format plantuml/c4plantuml \
            -output architecture/generated/c4-plantuml

      - name: Show generated C4-PlantUML files
        run: |
          find architecture/generated/c4-plantuml -type f -print
          test -n "$(find architecture/generated/c4-plantuml -type f -name '*.puml' -print -quit)"

      - name: Render C4-PlantUML to SVG
        run: |
          rm -rf docs/assets/diagrams/svg
          mkdir -p docs/assets/diagrams/svg

          echo "PlantUML files to render:"
          find architecture/generated/c4-plantuml -type f -name "*.puml" -print

          for file in architecture/generated/c4-plantuml/*.puml; do
            docker run --rm \
              -v ${{ github.workspace }}:/workspace \
              -w /workspace \
              plantuml/plantuml:latest \
              -tsvg \
              -o /workspace/docs/assets/diagrams/svg \
              "/workspace/$file"
          done

          echo "SVG files generated:"
          find docs/assets/diagrams/svg -type f -name "*.svg" -print

      - name: Show SVG files
        run: |
          echo "SVG files:"
          find docs -type f -name "*.svg" -print
          
      - name: Commit generated diagrams
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Generate C4-PlantUML diagrams from Structurizr"
          file_pattern: |
            architecture/generated/c4-plantuml/*
            docs/assets/diagrams/svg/**

  publish-docs:
    needs: generate-c4
    runs-on: ubuntu-latest

    steps:
      - name: Checkout updated repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install MkDocs
        run: |
          pip install mkdocs-material pymdown-extensions

      - name: Build MkDocs site
        run: |
          mkdocs build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
